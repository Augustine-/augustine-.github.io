    <!-- Resolve theme before first paint so the right colors apply immediately. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('augustine-io-theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
